<script type="text/javascript">
  // iSolarCloud regions. The id must match a configId registered in app.js (registerRegionConfigs).
  var REGIONS = [
    { id: 'eu', name: Homey.__('pair.regions.eu') || 'Europe', host: 'gateway.isolarcloud.eu' },
    { id: 'au', name: Homey.__('pair.regions.au') || 'Australia', host: 'augateway.isolarcloud.com' },
    { id: 'intl', name: Homey.__('pair.regions.intl') || 'International', host: 'gateway.isolarcloud.com.hk' }
  ];

  function selectRegion(regionId, button) {
    var buttons = document.querySelectorAll('button[data-region]');
    buttons.forEach(function (b) { b.disabled = true; });
    button.classList.add('is-loading');

    Homey.emit('set_region', regionId, function (err) {
      if (err) {
        button.classList.remove('is-loading');
        buttons.forEach(function (b) { b.disabled = false; });
        return Homey.alert(err.message || err.toString(), 'error');
      }
      Homey.nextView();
    });
  }

  function renderRegions() {
    var container = document.getElementById('regions');
    REGIONS.forEach(function (region) {
      var button = document.createElement('button');
      button.className = 'homey-button-primary-full';
      button.style.marginBottom = '8px';
      button.setAttribute('data-region', region.id);
      button.innerHTML = '<b>' + region.name + '</b><br><small>' + region.host + '</small>';
      button.onclick = function () { selectRegion(region.id, button); };
      container.appendChild(button);
    });
  }

  Homey.setTitle(Homey.__('pair.pick_region.title') || 'Select your region');
  renderRegions();

  setTimeout(function () {
    var el = document.getElementById('intro-text');
    if (el) {
      el.innerText = Homey.__('pair.pick_region.intro') || 'Choose the iSolarCloud region your account belongs to. This determines which gateway and login page is used.';
    }
  }, 0);

  Homey.ready();
</script>

<div class="homey-form-group">
  <p class="homey-text" id="intro-text"></p>
</div>
<div id="regions"></div>
